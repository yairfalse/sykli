id: ORACLE-CACHE-001
category: cache
source: "README.md §Content-addressed caching; CLAUDE.md §TaskResult Status Values"
validated_by: "If a cached task re-executes its command, CACHE-001 and CACHE-004 fail by observing side-effect files."
fixture: "test/blackbox/fixtures/cache_side_effect.exs"
command: "test/blackbox/run.sh --filter=CACHE-001"
assertions:
  - "The second identical run does not execute the task command."
  - "The second identical run reports task status cached, not passed."
