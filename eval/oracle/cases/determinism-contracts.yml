id: ORACLE-DET-002
category: determinism
source: "CLAUDE.md §No wall-clock or global RNG"
validated_by: "If the Credo NoWallClock check is disabled or not wired for lib/sykli files, DET-006 fails."
finding: "DET-006 currently fails: a temporary DateTime.utc_now file under lib/sykli is not rejected by the configured credo run."
fixture: "test/blackbox/fixtures/single_task.exs"
command: "test/blackbox/run.sh --filter=DET-006"
assertions:
  - "The shipped Credo configuration rejects direct wall-clock access."
